[mod-setting-description]
ccr-balanced-mode=Untick this to break balance. Only has an effect if using pyanodon's mods.
ccr-fridge-capacity=Set the item storage capacity for small fridges. Default to 20, minimum 1, maximum 80
ccr-warehouse-capacity=Set the item storage capacity for large warehouses. Default to 40, minimum 1, maximum 80
ccr-platwarehouse-capacity=Set the bonus inventory capacity for space freezing warehouse. Default to 10, minimum 1, maximum 40
ccr-numerator= How many spoilage ticks will be refreshed when checking spoilage. \n Items will spoil at a speed of (Denominator-Numerator)/Denominator. \n Numerator,Denominator -> 1,2 means items spoil at 50% speed, 9,10 means items spoil at 10% speed.
ccr-denominator= How long, in ticks, to wait until checking spoilage again. \n Items will spoil at a speed of (Denominator-Numerator)/Denominator. Interacts with Tickspread. \n
ccr-tickspread= When checking spoilage, divide the workload over this many batches. \n The effective checking rate for each chest is once every Denominator*Tickspread ticks. \n If you have 10 fridges with a denominator of 10, when the tickspread is 1, every 10 ticks we will check all 10 chests and update spoilage; \n with a tickspread of 2, every 10 ticks we will check a batch of 5 chests, alternating between one and the other; \n with a tickspread of 5, every 10 ticks we will check 2 chests every 10 ticks. \n Higher values of tickspread spread out the load more, but mean chests take more time to update spoilage. \n The batching is handled dynamically. Lower values affect UPS more. \n \n RECOMMENDATION: Just make sure that Denominator * Tickspread is not super big, like higher than 300, \n to make sure that refrigerators don't miss items that spoil super fast (5 seconds in this case).
ccr-log= Enable console messages that log what's happening. Only logs basic refrigerators.
ccr-warehouse-power-consumption=Set the power consumption rate of warehouse (in MW). \n Default to 10, minimum 0.01, maximum unlimited.
ccr-warehouse-power-capacity=Set the power storage capacity of warehouse (in MJ). \n Default to 3000, minimum 0.1, maximum unlimited.

