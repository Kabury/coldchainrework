[item-description]
refrigerator=Nuclear-powered refrigerator, slows the spoilage of items by a factor of 10(default) or your custom rates
logistic-refrigerator-passive-provider=Logistic refrigerator, can supply items, slows the spoilage of items by a factor of 10(default) or your custom rates
logistic-refrigerator-requester=Logistic refrigerator, can request items, slows the spoilage of items by a factor of 10(default) or your custom rates
logistic-refrigerator-buffer=Logistic refrigerator, can request or supply items, slows the spoilage of items by a factor of 10(default) or your custom rates
preservation-warehouse=Freezing warehouse, requires power, stops the spoilage of items completely
preservation-platform-warehouse=Space freezing warehouse. Provides bonus capacity to the space hub, only the increased slots will have freezing effect, these slots can be non-consecutive.
preservation-wagon=Preservation wagon, your best friend for cold chain logistics
preservation-inserter=A fast inserter that slows down item spoilage while holding items
preservation-long-inserter=A long-handed inserter that slows down item spoilage while holding items
preservation-stack-inserter=A stack inserter that slows down item spoilage while holding items
preservation-bulk-inserter=A bulk inserter that slows down item spoilage while holding multiple stacks of items

